name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  contract:
    name: OpenAPI Contract Types
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: tools/api-contract/package-lock.json

      - name: Install contract tools
        working-directory: tools/api-contract
        run: npm ci

      - name: Generate API types
        working-directory: tools/api-contract
        run: npm run generate

      - name: Verify generated files are current
        run: git diff --exit-code -- frontend/web/src/types/openapi.d.ts frontend/mobile/src/types/openapi.d.ts

  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: pytest

  frontend:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/web
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  mobile:
    name: Mobile Typecheck & Export
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Export Expo web
        env:
          EXPO_PUBLIC_API_BASE_URL: "http://127.0.0.1:8000"
          EXPO_NO_TELEMETRY: "1"
        run: npx expo export --platform web

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [contract, backend, frontend, mobile]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/web/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend/web
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: frontend/web
        run: npx playwright install --with-deps chromium

      - name: Reset E2E database
        working-directory: frontend/web
        run: node scripts/reset-e2e-db.mjs

      - name: Start backend
        working-directory: backend
        env:
          ENVIRONMENT: test
          DATABASE_URL: "sqlite:///./e2e.db"
          JWT_SECRET: e2e-only-secret-not-for-production
          BACKEND_CORS_ORIGINS: "http://127.0.0.1:5173,http://localhost:5173"
          RATE_LIMIT_REQUESTS: "10000"
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8000 > ../backend-e2e.log 2>&1 &
          echo $! > ../backend.pid

      - name: Start frontend
        working-directory: frontend/web
        env:
          VITE_API_BASE_URL: "http://127.0.0.1:8000/api/v1"
        run: |
          npx vite --host 127.0.0.1 --port 5173 > ../../frontend-e2e.log 2>&1 &
          echo $! > ../../frontend.pid

      - name: Wait for backend
        run: |
          echo "Waiting for backend at http://127.0.0.1:8000/health ..."
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:8000/health | grep -q '"status":"ok"'; then
              echo "Backend ready!"
              exit 0
            fi
            sleep 1
          done
          echo "Backend did not start in time"
          cat backend-e2e.log || true
          exit 1

      - name: Wait for frontend
        run: |
          echo "Waiting for frontend at http://127.0.0.1:5173 ..."
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:5173 > /dev/null 2>&1; then
              echo "Frontend ready!"
              exit 0
            fi
            sleep 1
          done
          echo "Frontend did not start in time"
          cat frontend-e2e.log || true
          exit 1

      - name: Run E2E tests
        working-directory: frontend/web
        run: npx playwright test

      - name: Stop services
        if: always()
        run: |
          if [ -f backend.pid ]; then kill $(cat backend.pid) 2>/dev/null || true; fi
          if [ -f frontend.pid ]; then kill $(cat frontend.pid) 2>/dev/null || true; fi

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/web/playwright-report/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: frontend/web/test-results/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload server logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-logs
          path: |
            backend-e2e.log
            frontend-e2e.log
          retention-days: 7
          if-no-files-found: ignore
